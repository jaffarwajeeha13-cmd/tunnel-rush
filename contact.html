<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Portfolio | Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: #050505; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .gaming-bg-header {
            width: 100%;
            height: 320px;
            background: linear-gradient(to bottom, rgba(5,5,5,0.2), #050505), 
                        url('images/backgroung image 1.jfif'); 
            background-size: cover;
            background-position: center;
        }
        .contact-area {
            max-width: 1100px;
            margin: -80px auto 50px;
            padding: 0 20px; 
            position: relative;
        }
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { 
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }
        .purple-glow-bar {
            width: 70px;
            height: 4px;
            background: #6d28d9;
            margin: 15px auto;
            box-shadow: 0 0 15px #6d28d9, 0 0 30px #6d28d9;
        }
        .flex-container {
            display: flex;
            gap: 30px; 
            justify-content: center;
            flex-wrap: wrap;
        }
        .contact-details { 
            flex: 1; 
            min-width: 300px; 
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .icon-wrap {
            width: 55px;
            height: 55px;
            background: #1a1a2e;
            border: 2px solid #6d28d9;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a78bfa;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .label { color: #a78bfa; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .value { 
            color: #cbd5e1; 
            font-size: 1.1rem; 
            word-break: break-all; 
        }
        .gaming-status {
            background: linear-gradient(135deg, #2e1065 0%, #050505 100%);
            border: 1px solid #4c1d95;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .glass-form-container {
            flex: 1.5;
            min-width: 300px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(109, 40, 217, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-box { margin-bottom: 25px; }
        .input-box label { display: block; margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        #submitBtn {
            width: 100%;
            padding: 16px;
            background: #6d28d9;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.4);
        }
        #submitBtn:hover {
            background: #7c3aed;
            box-shadow: 0 0 25px rgba(109, 40, 217, 0.8);
            transform: translateY(-3px);
        }

   
        
        @media (max-width: 992px) {
            .contact-area {
                margin-top: -50px; 
            }
        }

        @media (max-width: 768px) {
            .gaming-bg-header {
                height: 200px; 
            }
            .contact-area {
                margin-top: -30px;
            }
            .glass-form-container {
                padding: 25px;
            }
            .flex-container {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .detail-item {
                flex-direction: column; 
                align-items: flex-start;
                gap: 10px;
            }
            .gaming-status {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="gaming-bg-header"></div>
    <section class="contact-area">
        <div class="section-title">
            <h2>Get In Touch</h2>
            <div class="purple-glow-bar"></div>
        </div>
        <div class="flex-container">
            <div class="contact-details">
                <div class="detail-item">
                    <div class="icon-wrap"><i class="fas fa-envelope"></i></div>
                    <div>
                        <span class="label">Email</span>
                        <p class="value">gamingwebsite@gmail.com</p>
                    </div>
                </div>
                <div class="detail-item">
                    <div class="icon-wrap"><i class="fab fa-github"></i></div>
                    <div>
                        <span class="label">GitHub</span>
                        <p class="value">github.com/jaffarwajeeha13</p>
                    </div>
                </div>            
                <div class="gaming-status">
                    <i class="fas fa-terminal"></i>
                    <div>
                        <strong>Open to opportunities</strong>
                        <p>Seeking internships in AI and Creative Tech.</p>
                    </div>
                </div>
            </div>
            <div class="glass-form-container">
                <form id="contactForm">
                    <div class="input-box">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="input-box">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="example@gmail.com" required>
                    </div>
                    <div class="input-box">
                        <label>Your Message</label>
                        <textarea name="message" rows="4" placeholder="Type your message..." required></textarea>
                    </div>
                    <button type="submit" id="submitBtn">
                        SEND MESSAGE <i class="fas fa-bolt"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script>
        $(document).ready(function() {
            $('.contact-area').hide().fadeIn(1500);
            
            $('input, textarea').on('focus', function() {
                $(this).css({
                    'border-color': '#6d28d9',
                    'box-shadow': '0 0 10px rgba(109, 40, 217, 0.5)',
                    'transform': 'scale(1.01)'
                });
            });

            $('input, textarea').on('blur', function() {
                $(this).css({
                    'border-color': '#334155',
                    'box-shadow': 'none',
                    'transform': 'scale(1)'
                });
            });

            $('#contactForm').on('submit', function(e) {
                e.preventDefault();
                const name = $('input[name="name"]').val();
                $('#submitBtn').html('SENDING... <i class="fas fa-spinner fa-spin"></i>');
                
                setTimeout(function() {
                    alert("GG, " + name + "! Your message was sent successfully.");
                    $('#submitBtn').html('SEND MESSAGE <i class="fas fa-bolt"></i>');
                    $('#contactForm')[0].reset();
                }, 1500);
            });
        });
    </script>
</body>
</html>
